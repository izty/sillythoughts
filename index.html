<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silly Thoughts Diary Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="title-section">
    <h1 class="fade-title">Silly Thoughts Diary</h1>
  </section>
  <header class="site-header">
    <h1 style="display:none;">Silly Thoughts Diary</h1>
  </header>
  <main class="calendar-page">
    <section class="calendar-controls">
      <button id="prev-month" aria-label="Previous month">&larr;</button>
      <div class="calendar-current">
        <span id="calendar-month"></span>
        <span id="calendar-year"></span>
        <button
          id="calendar-picker-toggle"
          class="calendar-picker-button"
          type="button"
          aria-label="Open date picker"
        >
          <img
            src="icons/calendar_icon.png"
            alt="Calendar icon"
            class="calendar-picker-icon"
          />
        </button>
      </div>
      <button id="next-month" aria-label="Next month">&rarr;</button>
    </section>

    <section
      id="calendar-picker-panel"
      class="calendar-picker-panel"
      aria-label="Jump to date"
      hidden
    >
      <div class="picker-row">
        <label class="picker-field">
          <span>Year</span>
          <select id="picker-year"></select>
        </label>
        <label class="picker-field">
          <span>Month</span>
          <select id="picker-month"></select>
        </label>
        <label class="picker-field">
          <span>Day</span>
          <select id="picker-day"></select>
        </label>
        <button id="picker-go" class="picker-go-button" type="button">
          Go
        </button>
      </div>
    </section>

    <section class="calendar-container">
      <div class="calendar-grid" aria-label="Monthly calendar">
        <!-- Weekday headers and days will be rendered by script.js -->
      </div>
    </section>
    </main>
  </main>
  <script src="script.js"></script>
</body>
</html>
